<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quote Tool</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem;font-size:14px;max-width:960px;margin:0 auto}.section{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.25rem;margin-bottom:1rem}.sec-title{font-size:11px;font-weight:600;color:#888;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:1rem}.fx-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;align-items:start}.fx-cell{display:flex;flex-direction:column;border-bottom:0.5px solid rgba(0,0,0,0.06)}.fx-cell:nth-last-child(-n+2){border-bottom:none}.fx-row{display:grid;grid-template-columns:1fr 56px 28px;gap:6px;align-items:center;padding:5px 0}.fx-name{font-size:13px}.fx-expand{background:none;border:none;cursor:pointer;font-size:13px;color:#bbb;padding:2px 4px;border-radius:4px;line-height:1;display:flex;align-items:center;justify-content:center}.fx-expand:hover{background:#f0f0f0}.fx-expand.has-custom{color:#e67e22}.fx-expand.is-open{color:#555}.fx-detail-panel{display:none;flex-direction:column;gap:4px;padding:2px 0 8px 8px}.fx-detail-panel.open{display:flex}.det-unit{display:flex;flex-direction:column;gap:2px;padding:2px 0}.det-inline{display:flex;align-items:center;gap:6px}.det-num{font-size:12px;color:#888;min-width:14px;text-align:right;flex-shrink:0}.loc-row{display:flex;align-items:center;gap:6px;margin-top:2px;margin-left:20px}.loc-row label{font-size:11px;color:#888;white-space:nowrap}.loc-row input{font-size:12px;padding:3px 7px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a;flex:1;min-width:0}.sub-wrap{margin-left:20px;margin-top:2px}.sub-wrap label,.note-wrap label{font-size:11px;color:#888;display:block;margin-bottom:2px}.sub-wrap textarea,.note-wrap textarea{width:100%;font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);resize:vertical;min-height:36px;background:#fff;color:#1a1a1a}.note-wrap{margin-top:6px}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}.col-title{font-size:11px;font-weight:600;color:#888;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}.char-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}.char-row:last-child{border-bottom:none}.char-lbl{font-size:13px;flex:1}.patch-row{display:flex;gap:4px}.gen-note-wrap{margin-top:1rem;padding-top:1rem;border-top:0.5px solid rgba(0,0,0,0.06)}.gen-note-wrap label{font-size:11px;color:#888;display:block;margin-bottom:4px}.gen-note-wrap textarea{width:100%;font-size:13px;padding:6px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);resize:vertical;min-height:52px;background:#fff;color:#1a1a1a}.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}.pcard{background:#f5f5f3;border-radius:8px;padding:1rem}.pcard-lbl{font-size:12px;color:#888;margin-bottom:4px}.pcard-val{font-size:26px;font-weight:500}.out-box{background:#f5f5f3;border-radius:8px;padding:1rem;font-size:13px;line-height:1.8;white-space:pre-wrap;font-family:monospace;min-height:80px;margin-bottom:8px}.copy-btn{width:100%;margin-top:6px;font-size:13px;padding:9px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff}.copy-btn:hover{background:#f5f5f3}.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}.qnum-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}.qnum-row label{font-size:14px}select{font-size:13px;padding:3px 6px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a}input[type=number]{font-size:13px;padding:4px 6px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);width:56px;text-align:center}input[type=checkbox]{width:16px;height:16px;cursor:pointer}input[type=text],input[type=password]{font-size:13px;padding:4px 8px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:#1a1a1a}.gen-btn{width:100%;padding:12px;font-size:15px;font-weight:500;cursor:pointer;background:#1a1a1a;color:#fff;border:none;border-radius:12px}.gen-btn:hover{background:#333}.fin-btn{width:100%;padding:12px;font-size:15px;font-weight:500;cursor:pointer;background:#1d6a3a;color:#fff;border:none;border-radius:12px}.fin-btn:hover{background:#155229}.fin-btn:disabled{background:#aaa;cursor:not-allowed}.loading{color:#888;font-size:14px;padding:2rem;text-align:center}.error{color:#c0392b;font-size:13px;padding:1rem;background:#fdf2f2;border-radius:8px;margin-bottom:1rem}.save-status{font-size:12px;color:#888;text-align:center;padding:4px;min-height:20px}#login-screen{display:flex;align-items:center;justify-content:center;min-height:90vh}.login-box{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:16px;padding:2rem;width:100%;max-width:320px;text-align:center}.login-box input{width:100%;padding:10px 12px;font-size:14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);margin-bottom:1rem;text-align:center}.login-box button{width:100%;padding:11px;font-size:14px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer}.login-box button:hover{background:#333}.login-err{color:#c0392b;font-size:12px;margin-top:8px;min-height:18px}.draft-banner{background:#fff8e1;border:0.5px solid #f9a825;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px;color:#5d4037}.draft-banner p{margin-bottom:8px}.draft-banner-btns{display:flex;gap:8px}.draft-banner-btns button{padding:6px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.2)}.draft-banner-btns .yes-btn{background:#1a1a1a;color:#fff;border-color:#1a1a1a}</style></head><body><div id="login-screen"><div class="login-box"><input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()"><button onclick="tryLogin()">Continue</button><div class="login-err" id="login-err"></div></div></div><div id="main-app" style="display:none"><div id="draft-banner" style="display:none"></div><div id="loading" class="loading">Loading...</div><div id="error" class="error" style="display:none"></div><div id="app" style="display:none"><div class="section"><div class="sec-title">Quote info</div><div class="qnum-row"><label>Quote number</label><input type="text" id="quoteNum" placeholder="e.g. Q-2024-001" style="width:180px;padding:6px 10px;border-radius:8px"><label>Version</label><select id="versionSel" onchange="onVersionChange()"></select></div></div><div class="section"><div class="sec-title">Fixtures</div><div class="fx-grid" id="fx-container"></div></div><div class="section"><div class="two-col"><div><div class="col-title">Office notes</div><div id="char-container"></div></div><div><div class="col-title">Site conditions</div><div id="site-container"></div><div class="gen-note-wrap"><label>Additional notes</label><textarea id="site-general-note" placeholder="Any additional site notes..."></textarea></div></div></div></div><div class="btn-row"><button class="gen-btn" onclick="generate()">Generate quote</button><button class="fin-btn" id="fin-btn" onclick="finalize()" disabled style="opacity:0.4">Finalize &amp; save</button></div><div class="section" id="output-section" style="display:none"><div class="sec-title">Pricing</div><div class="price-grid"><div class="pcard"><div class="pcard-lbl">Repipe price</div><div class="pcard-val" id="repipe-price">-</div></div><div class="pcard"><div class="pcard-lbl">Patching price</div><div class="pcard-val" id="patch-price">-</div></div></div><div class="save-status" id="save-status"></div><div class="sec-title" style="margin-top:1rem">Repipe notes</div><div class="out-box" id="notes-out"></div><button class="copy-btn" onclick="copyNotes()">Copy notes</button><div class="sec-title" style="margin-top:1rem">Log data</div><div class="out-box" id="log-out" style="font-size:11px"></div><button class="copy-btn" onclick="copyLog()">Copy log row</button></div></div></div><script>
const BASE='https://docs.google.com/spreadsheets/d/e/2PACX-1vTqzn81-JwojJFPcBt76ztHAdefHyqF7wpPzawwKwrJqasgw88FkTgEZHtYdW--J0gBj1aispOXxvg9/pub?single=true&output=csv&gid=';
const GIDS={Auth:'42606263',What:'1494554881',Gather1:'62254917',Detail:'528508865',Adjust:'51515145',M:'1387434188',M2:'1520995098',Char:'4998717',Site:'1859968359',Notes1:'2080488995',Notes2:'77075483'};
const SB_URL='https://kwttjxikbfuxdxejstvp.supabase.co';
const SB_KEY='sb_publishable_X5G1waCFTh49bMZK8KLrfw_aewmSm7P';
const LETTERS=['--','A','B','C','D','E','F','G','H','I','J'];
const NUMS=['--','1','2','3','4','5','6','7','8','9'];
const DRAFT_KEY='quote_tool_draft';
let RAW={},VERSIONS=[],FIXTURES=[],DETAIL_LISTS={},ADJUST_MAP={},FX_PRICE={},PATCHING_RATE=0,M2_ADDONS=[],SITE_FIELDS=[],CHAR_FIELDS=[],NOTES1=[],NOTES2=[],SUB_NOTES={};
let CORRECT_PW='';
let currentDraft=null;

function parseCSV(text){
  return text.trim().split('\n').map(line=>{
    const cols=[];let cur='';let inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r=>r.some(c=>c!==''));
}

async function ft(gid){
  const r=await fetch(BASE+gid);
  if(!r.ok)throw new Error('HTTP '+r.status+' for gid '+gid);
  return parseCSV(await r.text());
}

async function sbInsert(table,data){
  const r=await fetch(SB_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return await r.json();
}

function lNum(l){if(!l||l==='--'||!l.match(/[a-zA-Z]/))return 0;return l.toUpperCase().charCodeAt(0)-64;}

async function tryLogin(){
  const entered=document.getElementById('pw-input').value.trim();
  const errEl=document.getElementById('login-err');
  errEl.textContent='';
  if(!CORRECT_PW){
    try{
      const rows=await ft(GIDS.Auth);
      CORRECT_PW=(rows[0]?.[0]||'').trim();
    }catch(e){errEl.textContent='Could not load auth. Try again.';return;}
  }
  if(entered===CORRECT_PW){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    loadData();
  }else{
    errEl.textContent='Incorrect password.';
    document.getElementById('pw-input').value='';
  }
}

async function loadData(){
  try{
    const [whatR,g1R,detR,adjR,mR,m2R,charR,siteR,n1R,n2R]=await Promise.all([
      ft(GIDS.What),ft(GIDS.Gather1),ft(GIDS.Detail),
      ft(GIDS.Adjust),ft(GIDS.M),ft(GIDS.M2),ft(GIDS.Char),
      ft(GIDS.Site),ft(GIDS.Notes1),ft(GIDS.Notes2)
    ]);
    RAW={whatR,g1R,detR,adjR,mR,m2R,charR,siteR,n1R,n2R};
    const vset=new Set();
    [whatR,g1R,detR,adjR,mR,charR,siteR,n1R,n2R].forEach(rows=>{
      rows.slice(1).forEach(r=>{if(r[0]&&r[0].match(/^V\d+$/i))vset.add(r[0].trim());});
    });
    VERSIONS=[...vset].sort();
    const sel=document.getElementById('versionSel');
    sel.innerHTML=VERSIONS.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    applyVersion(VERSIONS[0]);
    checkDraft();
  }catch(e){
    document.getElementById('loading').style.display='none';
    const el=document.getElementById('error');
    el.style.display='block';
    el.textContent='Error loading sheet: '+e.message;
  }
}

function checkDraft(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY);
    if(!raw)return;
    const draft=JSON.parse(raw);
    const banner=document.getElementById('draft-banner');
    banner.style.display='block';
    banner.innerHTML='<p>You have an unsaved quote from '+draft.quote_date+' for <strong>'+(draft.quote_number||'(no number)')+'</strong>. Save it now?</p><div class="draft-banner-btns"><button class="yes-btn" onclick="saveDraft()">Yes, save it</button><button onclick="discardDraft()">Discard</button></div>';
  }catch(e){localStorage.removeItem(DRAFT_KEY);}
}

async function saveDraft(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY);
    if(!raw)return;
    const draft=JSON.parse(raw);
    draft.quoteData.quote_number=(draft.quoteData.quote_number||'--')+'-DRAFT';
    const result=await sbInsert('quotes',draft.quoteData);
    const quoteId=result[0]?.id;
    if(quoteId&&draft.fixtureRows.length>0){
      draft.fixtureRows.forEach(r=>r.quote_id=quoteId);
      await sbInsert('quote_fixtures',draft.fixtureRows);
    }
    localStorage.removeItem(DRAFT_KEY);
    document.getElementById('draft-banner').style.display='none';
    alert('Draft saved successfully.');
  }catch(e){alert('Failed to save draft: '+e.message);}
}

function discardDraft(){
  localStorage.removeItem(DRAFT_KEY);
  document.getElementById('draft-banner').style.display='none';
}

function onVersionChange(){
  document.getElementById('output-section').style.display='none';
  document.getElementById('fin-btn').disabled=true;
  document.getElementById('fin-btn').style.opacity='0.4';
  currentDraft=null;
  applyVersion(document.getElementById('versionSel').value);
}

function applyVersion(ver){
  const {whatR,g1R,detR,adjR,mR,m2R,charR,siteR,n1R,n2R}=RAW;
  const detailAssign={};
  g1R.slice(1).filter(r=>r[0]===ver).forEach(r=>{if(r[1])detailAssign[r[1]]=(r[2]||'').trim()||null;});
  FIXTURES=[];
  whatR.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1]||!r[2])return;
    if(!r[1].toUpperCase().startsWith('R'))return;
    FIXTURES.push({code:r[1],name:r[2],detail:detailAssign[r[1]]||null});
  });
  const dlists={};
  detR.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1])return;
    const lk=r[1].trim();
    dlists[lk]=[];
    for(let col=2;col<r.length;col++){
      dlists[lk].push({val:lk+(col-1),label:(r[col]||'').trim()});
    }
    while(dlists[lk].length&&dlists[lk][dlists[lk].length-1].label==='')dlists[lk].pop();
  });
  DETAIL_LISTS=dlists;
  SUB_NOTES={'A2':'Faucet description (finish, make, model)','E3':'Customer provided valve details','E4':'Requested valve details (make, model)'};
  ADJUST_MAP={};
  adjR.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1]||!r[2]||r[3]==='')return;
    const subCode=r[2].trim().toUpperCase();
    const adj=parseFloat(r[3]);
    if(!isNaN(adj))ADJUST_MAP[subCode]=adj;
  });
  FX_PRICE={};PATCHING_RATE=0;
  mR.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1]||!r[2])return;
    const code=r[1].trim();
    const price=parseInt((r[2]||'').replace(/[^0-9]/g,''));
    if(isNaN(price))return;
    if(code.startsWith('R')){FX_PRICE[code]=price;}
    else if(code==='P1'){PATCHING_RATE=price;}
  });
  M2_ADDONS=[];
  m2R.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1]||!r[2]||!r[3])return;
    const fxCode=r[1].trim().toUpperCase();
    const subCode=r[2].trim().toUpperCase();
    const price=parseInt((r[3]||'').replace(/[^0-9]/g,''));
    if(!isNaN(price))M2_ADDONS.push({fxCode,detVal:subCode,price});
  });
  CHAR_FIELDS=[];
  charR.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1])return;
    const id=r[1].toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
    const pct=parseFloat((r[4]||'0').replace('%',''))/100||0;
    const dtype=(r[2]||'').toLowerCase();
    let type='bool';
    if(dtype.includes('letter')||dtype.includes('code')||dtype.includes('digit'))type='letter';
    if(r[1].toLowerCase().includes('patch'))type='patch';
    CHAR_FIELDS.push({id,label:r[1],type,pct});
  });
  SITE_FIELDS=[];
  siteR.slice(1).filter(r=>r[0]===ver).forEach(r=>{
    if(!r[1])return;
    const id=r[1].toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
    const pct=parseFloat((r[4]||'0').replace('%',''))/100||0;
    const dtype=(r[2]||'').toLowerCase();
    let type='bool';
    if(dtype.includes('#')||dtype.includes('drop')||dtype.includes('num'))type='stories';
    SITE_FIELDS.push({id,label:r[1],type,pct});
  });
  NOTES1=[];
  n1R.slice(1).filter(r=>r[0]===ver).forEach(r=>{if(r[1])NOTES1.push({text:r[1],logic:(r[2]||'always on').toLowerCase().trim(),sub:(r[3]||'').toUpperCase()==='TRUE',order:parseInt(r[4])||99});});
  NOTES2=[];
  n2R.slice(1).filter(r=>r[0]===ver).forEach(r=>{if(r[1])NOTES2.push({text:r[1],logic:(r[2]||'always on').toLowerCase().trim(),sub:(r[3]||'').toUpperCase()==='TRUE',order:parseInt(r[4])||99});});
  buildUI();
}

function getDetailList(fx){
  if(!fx.detail)return null;
  const keys=fx.detail.split(',').map(k=>k.trim()).filter(k=>k);
  const combined=[];
  keys.forEach(k=>{const list=DETAIL_LISTS[k];if(list)list.forEach(o=>combined.push(o));});
  return combined.length>1?combined:null;
}

function getAdjForVal(val){
  const key=val.toUpperCase();
  return ADJUST_MAP[key]!==undefined?ADJUST_MAP[key]:1;
}

function hasCustomSelection(code){
  const fx=FIXTURES.find(f=>f.code===code);if(!fx)return false;
  const list=getDetailList(fx);
  if(list){
    const def=list[0].val;
    for(let i=0;i<getCnt(code);i++){const el=document.getElementById('sel_'+code+'_'+i);if(el&&el.value!==def)return true;}
  }
  const note=document.getElementById('fxnote_'+code);
  if(note&&note.value.trim())return true;
  return false;
}

function updateExpandBtn(code){
  const btn=document.getElementById('expbtn_'+code);if(!btn)return;
  const isOpen=document.getElementById('panel_'+code)?.classList.contains('open');
  const custom=hasCustomSelection(code);
  btn.className='fx-expand'+(custom?' has-custom':'')+(isOpen?' is-open':'');
  btn.textContent=isOpen?'▲':'▼';
}

function buildUI(){buildFixtures();buildChars();buildSite();}

function makeNoteWrap(code){
  const nw=document.createElement('div');nw.className='note-wrap';
  const lbl=document.createElement('label');lbl.textContent='Additional note';
  const ta=document.createElement('textarea');
  ta.id='fxnote_'+code;ta.placeholder='Appended as a bullet to this fixture...';
  ta.addEventListener('input',()=>updateExpandBtn(code));
  nw.appendChild(lbl);nw.appendChild(ta);
  return nw;
}

function buildFixtures(){
  const c=document.getElementById('fx-container');c.innerHTML='';
  FIXTURES.forEach(fx=>{
    const cell=document.createElement('div');cell.className='fx-cell';
    const row=document.createElement('div');row.className='fx-row';
    const nameDiv=document.createElement('div');nameDiv.className='fx-name';nameDiv.textContent=fx.name;
    const inp=document.createElement('input');inp.type='number';inp.min=0;inp.max=20;inp.value=0;
    inp.id='cnt_'+fx.code;
    inp.onchange=()=>{rebuildUnits(fx.code);updateExpandBtn(fx.code);};
    const expBtn=document.createElement('button');
    expBtn.className='fx-expand';expBtn.id='expbtn_'+fx.code;expBtn.textContent='▼';
    expBtn.onclick=()=>togglePanel(fx.code);
    row.appendChild(nameDiv);row.appendChild(inp);row.appendChild(expBtn);
    cell.appendChild(row);
    const panel=document.createElement('div');panel.className='fx-detail-panel';panel.id='panel_'+fx.code;
    panel.appendChild(makeNoteWrap(fx.code));
    cell.appendChild(panel);
    c.appendChild(cell);
  });
}

function togglePanel(code){
  const panel=document.getElementById('panel_'+code);if(!panel)return;
  const isOpen=panel.classList.contains('open');
  if(isOpen){panel.classList.remove('open');}else{rebuildUnits(code);panel.classList.add('open');}
  updateExpandBtn(code);
}

function rebuildUnits(code){
  const fx=FIXTURES.find(f=>f.code===code);
  const cnt=getCnt(code);
  const panel=document.getElementById('panel_'+code);if(!panel)return;
  const list=getDetailList(fx);
  const prevNote=document.getElementById('fxnote_'+code)?.value||'';
  const prevVals={};
  for(let i=0;i<20;i++){const el=document.getElementById('sel_'+code+'_'+i);if(el)prevVals[i]=el.value;}
  panel.innerHTML='';
  if(list){
    for(let i=0;i<cnt;i++){
      const unitDiv=document.createElement('div');unitDiv.className='det-unit';
      const inlineRow=document.createElement('div');inlineRow.className='det-inline';
      const num=document.createElement('span');num.className='det-num';num.textContent=i+1;
      const sel=document.createElement('select');sel.id='sel_'+code+'_'+i;
      sel.innerHTML=list.map(o=>'<option value="'+o.val+'">'+(o.label||'--')+'</option>').join('');
      if(prevVals[i])sel.value=prevVals[i];
      sel.onchange=()=>{refreshSubFields(code,i);updateExpandBtn(code);};
      inlineRow.appendChild(num);inlineRow.appendChild(sel);
      const subDiv=document.createElement('div');subDiv.id='sub_'+code+'_'+i;
      unitDiv.appendChild(inlineRow);unitDiv.appendChild(subDiv);
      panel.appendChild(unitDiv);
      refreshSubFields(code,i);
    }
  }
  panel.appendChild(makeNoteWrap(code));
  if(prevNote)document.getElementById('fxnote_'+code).value=prevNote;
}

function refreshSubFields(code,i){
  const fx=FIXTURES.find(f=>f.code===code);
  const list=getDetailList(fx);if(!list)return;
  const defaultVal=list[0].val;
  const sub=document.getElementById('sub_'+code+'_'+i);if(!sub)return;
  const el=document.getElementById('sel_'+code+'_'+i);
  const val=el?el.value:defaultVal;
  const cnt=getCnt(code);
  sub.innerHTML='';
  if(val!==defaultVal&&cnt>1){
    const lr=document.createElement('div');lr.className='loc-row';
    lr.innerHTML='<label>Location</label><input type="text" id="loc_'+code+'_'+i+'" placeholder="e.g. master bath">';
    sub.appendChild(lr);
  }
  if(SUB_NOTES[val]){
    const sw=document.createElement('div');sw.className='sub-wrap';
    sw.innerHTML='<label>'+SUB_NOTES[val]+'</label><textarea id="snote_'+code+'_'+i+'" placeholder="'+SUB_NOTES[val]+'"></textarea>';
    sub.appendChild(sw);
  }
}

function buildChars(){
  const c=document.getElementById('char-container');c.innerHTML='';
  CHAR_FIELDS.forEach(f=>{
    const row=document.createElement('div');row.className='char-row';
    const lbl=document.createElement('span');lbl.className='char-lbl';lbl.textContent=f.label;
    row.appendChild(lbl);
    if(f.type==='bool'){const cb=document.createElement('input');cb.type='checkbox';cb.id='char_'+f.id;row.appendChild(cb);}
    else if(f.type==='letter'){const sel=document.createElement('select');sel.id='char_'+f.id;sel.innerHTML=LETTERS.map(l=>'<option>'+l+'</option>').join('');row.appendChild(sel);}
    else if(f.type==='patch'){
      const pr=document.createElement('div');pr.className='patch-row';
      const sl=document.createElement('select');sl.id='char_patch_l';sl.innerHTML=LETTERS.map(l=>'<option>'+l+'</option>').join('');
      const sn=document.createElement('select');sn.id='char_patch_n';sn.innerHTML=NUMS.map(n=>'<option>'+n+'</option>').join('');
      pr.appendChild(sl);pr.appendChild(sn);row.appendChild(pr);
    }
    c.appendChild(row);
  });
}

function buildSite(){
  const c=document.getElementById('site-container');c.innerHTML='';
  SITE_FIELDS.forEach(f=>{
    const row=document.createElement('div');row.className='char-row';
    const lbl=document.createElement('span');lbl.className='char-lbl';lbl.textContent=f.label;
    row.appendChild(lbl);
    if(f.type==='bool'){const cb=document.createElement('input');cb.type='checkbox';cb.id='site_'+f.id;row.appendChild(cb);}
    else{
      const sel=document.createElement('select');sel.id='site_'+f.id;
      let opts='';for(let i=0;i<=20;i++)opts+='<option value="'+i+'">'+i+'</option>';
      sel.innerHTML=opts;row.appendChild(sel);
    }
    c.appendChild(row);
  });
}

function getMult(){
  let m=1;
  SITE_FIELDS.forEach(f=>{
    const el=document.getElementById('site_'+f.id);if(!el)return;
    if(f.type==='bool'){if(el.checked)m+=f.pct;}else{m+=(parseInt(el.value)||0)*f.pct;}
  });
  CHAR_FIELDS.filter(f=>f.type!=='patch').forEach(f=>{
    const el=document.getElementById('char_'+f.id);if(!el)return;
    if(f.type==='bool'){if(el.checked)m+=f.pct;}
    else if(f.type==='letter'){m+=lNum(el.value)*f.pct;}
  });
  return m;
}

function getPatchPrice(mult){
  const l=document.getElementById('char_patch_l');
  const n=document.getElementById('char_patch_n');
  if(!l||!n||l.value==='--'||n.value==='--')return 0;
  return Math.round((lNum(l.value)*10+parseInt(n.value))*PATCHING_RATE*mult/50)*50;
}

function getRepipeBase(){
  let total=0;
  FIXTURES.forEach(fx=>{
    const cnt=getCnt(fx.code);if(cnt===0)return;
    const unitPrice=FX_PRICE[fx.code]||0;
    const list=getDetailList(fx);
    if(!list){total+=cnt*unitPrice;return;}
    for(let i=0;i<cnt;i++){
      const el=document.getElementById('sel_'+fx.code+'_'+i);
      const val=el?el.value:list[0].val;
      const adj=getAdjForVal(val);
      total+=adj*unitPrice;
      M2_ADDONS.forEach(addon=>{
        const fxMatch=addon.fxCode==='R*'||addon.fxCode===fx.code;
        if(fxMatch&&val.toUpperCase()===addon.detVal&&adj>0)total+=addon.price;
      });
    }
  });
  return Math.round(total);
}

function getCnt(code){return parseInt(document.getElementById('cnt_'+code)?.value)||0;}

function getDetCount(rNum,detLetter){
  const fx=FIXTURES[rNum-1];if(!fx)return 0;
  const cnt=getCnt(fx.code);
  const list=getDetailList(fx);if(!list)return 0;
  let c=0;
  for(let i=0;i<cnt;i++){
    const el=document.getElementById('sel_'+fx.code+'_'+i);
    if(el&&el.value.startsWith(detLetter.toUpperCase()))c++;
  }
  return c;
}

function getRCount(rNum){
  const fx=FIXTURES[rNum-1];if(!fx)return 0;
  return getCnt(fx.code);
}

function evalLogic(logic){
  if(!logic||logic==='always on')return true;
  try{
    let expr=logic.trim();
    expr=expr.replace(/r(\d+)([a-z])([><=!]+)(\d+)/gi,(m,num,det,op,val)=>getDetCount(parseInt(num),det)+op+val);
    expr=expr.replace(/r(\d+)([><=!]+)(\d+)/gi,(m,num,op,val)=>getRCount(parseInt(num))+op+val);
    expr=expr.replace(/,,/g,',');
    const parts=expr.split(',').map(p=>p.trim()).filter(p=>p);
    return parts.every(p=>{try{return !!eval(p);}catch(e){return true;}});
  }catch(e){return true;}
}

function buildNotes(){
  const lines=[];
  NOTES1.sort((a,b)=>a.order-b.order).forEach(n=>{if(evalLogic(n.logic))lines.push((n.sub?'  \u2022 ':'')+n.text);});
  FIXTURES.forEach(fx=>{
    const cnt=getCnt(fx.code);if(cnt===0)return;
    const list=getDetailList(fx);
    if(!list){lines.push('  \u2022 ('+cnt+') '+fx.name);}
    else{
      const def=list[0].val;
      const vals=[];
      for(let i=0;i<cnt;i++){const el=document.getElementById('sel_'+fx.code+'_'+i);vals.push(el?el.value:def);}
      const allSame=vals.every(v=>v===vals[0]);
      if(allSame){
        const lbl=list.find(o=>o.val===vals[0])?.label||'';
        let line='  \u2022 ('+cnt+') '+fx.name;
        if(lbl)line+='\n      - '+lbl;
        lines.push(line);
      }else{
        let line='  \u2022 ('+cnt+') '+fx.name;
        vals.forEach((v,i)=>{
          const lbl=list.find(o=>o.val===v)?.label||'';
          const locEl=document.getElementById('loc_'+fx.code+'_'+i);
          const loc=locEl?locEl.value.trim():'';
          if(lbl)line+='\n      - '+(loc?loc+': ':'')+lbl;
        });
        lines.push(line);
      }
    }
    const fxNote=document.getElementById('fxnote_'+fx.code)?.value.trim();
    if(fxNote)lines.push('      - '+fxNote);
  });
  lines.push('');
  NOTES2.sort((a,b)=>a.order-b.order).forEach(n=>{if(evalLogic(n.logic))lines.push((n.sub?'  \u2022 ':'')+n.text);});
  const siteNote=document.getElementById('site-general-note')?.value.trim();
  if(siteNote){lines.push('');lines.push(siteNote);}
  return lines.join('\n');
}

function buildQuoteData(qNum,ver,base,mult,repipe,patch){
  const quoteData={
    quote_number:qNum,version:ver,
    quote_date:new Date().toLocaleDateString(),
    base_price:base,multiplier:parseFloat(mult.toFixed(3)),
    repipe_price:repipe,patch_price:patch,
    site_notes:document.getElementById('site-general-note')?.value.trim()||null
  };
  CHAR_FIELDS.forEach(f=>{
    if(f.type==='patch'){
      const l=document.getElementById('char_patch_l');
      const n=document.getElementById('char_patch_n');
      quoteData.patching_code=(l&&n&&l.value!=='--'&&n.value!=='--')?l.value+n.value:null;
    }else{
      const el=document.getElementById('char_'+f.id);if(!el)return;
      quoteData[f.id]=f.type==='bool'?el.checked:(el.value==='--'?null:el.value);
    }
  });
  SITE_FIELDS.forEach(f=>{
    const el=document.getElementById('site_'+f.id);if(!el)return;
    quoteData[f.id]=f.type==='bool'?el.checked:parseInt(el.value)||0;
  });
  const fixtureRows=[];
  FIXTURES.forEach(fx=>{
    const cnt=getCnt(fx.code);if(cnt===0)return;
    const list=getDetailList(fx);
    const sels=[];
    if(list){for(let i=0;i<cnt;i++){const el=document.getElementById('sel_'+fx.code+'_'+i);sels.push(el?el.value:list[0].val);}}
    fixtureRows.push({
      fixture_code:fx.code,fixture_name:fx.name,count:cnt,
      detail_selections:sels.length?sels.join(';'):null,
      additional_note:document.getElementById('fxnote_'+fx.code)?.value.trim()||null
    });
  });
  return {quoteData,fixtureRows};
}

function generate(){
  const qNum=document.getElementById('quoteNum').value.trim()||'--';
  const ver=document.getElementById('versionSel').value;
  const mult=getMult();
  const base=getRepipeBase();
  const repipe=Math.round(base*mult/50)*50;
  const patch=getPatchPrice(mult);
  document.getElementById('repipe-price').textContent='$'+repipe.toLocaleString();
  document.getElementById('patch-price').textContent=patch>0?'$'+patch.toLocaleString():'--';
  document.getElementById('notes-out').textContent=buildNotes();
  document.getElementById('log-out').textContent=buildLog(qNum,ver,base,mult,repipe,patch);
  document.getElementById('output-section').style.display='block';
  document.getElementById('save-status').textContent='Not yet saved.';
  const {quoteData,fixtureRows}=buildQuoteData(qNum,ver,base,mult,repipe,patch);
  currentDraft={quoteData,fixtureRows};
  try{localStorage.setItem(DRAFT_KEY,JSON.stringify(currentDraft));}catch(e){}
  const btn=document.getElementById('fin-btn');
  btn.disabled=false;btn.style.opacity='1';
}

async function finalize(){
  if(!currentDraft)return;
  const btn=document.getElementById('fin-btn');
  const status=document.getElementById('save-status');
  btn.disabled=true;btn.style.opacity='0.4';
  status.textContent='Saving...';
  try{
    const result=await sbInsert('quotes',currentDraft.quoteData);
    const quoteId=result[0]?.id;
    if(!quoteId)throw new Error('No quote ID returned');
    if(currentDraft.fixtureRows.length>0){
      currentDraft.fixtureRows.forEach(r=>r.quote_id=quoteId);
      await sbInsert('quote_fixtures',currentDraft.fixtureRows);
    }
    localStorage.removeItem(DRAFT_KEY);
    currentDraft=null;
    status.textContent='Saved successfully.';
    btn.textContent='Saved';
  }catch(e){
    status.textContent='Save failed: '+e.message;
    btn.disabled=false;btn.style.opacity='1';
    console.error(e);
  }
}

function buildLog(qNum,ver,base,mult,repipe,patch){
  const parts=[qNum,ver,new Date().toLocaleDateString()];
  FIXTURES.forEach(fx=>parts.push(getCnt(fx.code)));
  FIXTURES.forEach(fx=>{
    const cnt=getCnt(fx.code);
    const list=getDetailList(fx);
    if(!list||cnt===0){parts.push('');return;}
    const sels=[];
    for(let i=0;i<cnt;i++){const el=document.getElementById('sel_'+fx.code+'_'+i);sels.push(el?el.value:list[0].val);}
    parts.push(sels.join(';'));
  });
  SITE_FIELDS.forEach(f=>{
    const el=document.getElementById('site_'+f.id);
    parts.push(f.type==='bool'?(el&&el.checked?'TRUE':'FALSE'):(el?el.value:0));
  });
  CHAR_FIELDS.forEach(f=>{
    if(f.type==='patch'){
      const l=document.getElementById('char_patch_l');
      const n=document.getElementById('char_patch_n');
      parts.push(l&&n&&l.value!=='--'&&n.value!=='--'?l.value+n.value:'');return;
    }
    const el=document.getElementById('char_'+f.id);if(!el){parts.push('');return;}
    parts.push(f.type==='bool'?(el.checked?'TRUE':'FALSE'):(el.value==='--'?'':el.value));
  });
  parts.push(base,mult.toFixed(3),repipe,patch);
  return parts.join('\t');
}

function copyNotes(){
  navigator.clipboard.writeText(document.getElementById('notes-out').textContent)
    .then(()=>{const b=event.target;const orig=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=orig,1500);});
}
function copyLog(){
  navigator.clipboard.writeText(document.getElementById('log-out').textContent)
    .then(()=>{const b=event.target;const orig=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=orig,1500);});
}
